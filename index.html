<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a10">
  <title>互联网生存成就系统 · 它在偷偷给你颁奖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@500;700&family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@500;700;900&family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 全局纹理覆盖 -->
  <div class="grain" aria-hidden="true"></div>

  <main class="phone" id="phone">
    <!-- 抖音风顶栏 -->
    <header class="dy-topnav">
      <button class="dy-menu" aria-label="菜单">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <nav class="dy-tabs">
        <span class="dy-tab">关注</span>
        <span class="dy-tab">发现</span>
        <span class="dy-tab dy-active">推荐</span>
        <span class="dy-tab">附近</span>
      </nav>
      <button class="dy-trophy" id="headerTrophy" title="成就馆">
        <span class="dy-trophy-ico">🏆</span>
        <span class="dy-trophy-num"><b id="headerCount">0</b>/<span id="headerTotal">0</span></span>
        <span class="dy-trophy-dot" id="headerTrophyDot"></span>
      </button>
    </header>

    <!-- 内容流 -->
    <div class="feed" id="feed"></div>

    <!-- 系统状态条 (低调地告诉你"在被记录") -->
    <div class="dy-sysbar" id="dySysbar">
      <span class="dy-sysbar-dot"></span>
      <span id="brandSub">系统正在偷看你</span>
    </div>

    <!-- 抖音风底部导航 (全局) -->
    <nav class="dy-botnav">
      <button class="dy-nbtn dy-active">首页</button>
      <button class="dy-nbtn">朋友</button>
      <button class="dy-plus" aria-label="拍摄">
        <span class="dy-plus-cyan"></span>
        <span class="dy-plus-red"></span>
        <span class="dy-plus-inner">+</span>
      </button>
      <button class="dy-nbtn dy-with-dot">消息</button>
      <button class="dy-nbtn">我</button>
    </nav>

    <!-- 弹窗挂载点 -->
    <div id="popupRoot"></div>
    <div id="personaRoot"></div>
    <div id="galleryRoot"></div>
  </main>

  <!-- 桌面侧栏(移动端隐藏): 杂志感介绍 -->
  <aside class="side-zine">
    <div class="zine-stamp">No. 01</div>
    <h1 class="zine-title">互联网<br>生存<br>成就<br>系统</h1>
    <div class="zine-divider"></div>
    <p class="zine-lead">
      它不会真的分析你。<br>
      它只会把你的每一次走神、点赞、犹豫,<br>
      读成<span class="zine-mark">荒谬的</span>结论。
    </p>
    <ul class="zine-list">
      <li><span class="li-no">01</span>上下滑动 — 翻刷分类不同的视频</li>
      <li><span class="li-no">02</span>点赞 / 收藏 / 评论 / 输入 — 都会被读成笑话</li>
      <li><span class="li-no">03</span>凌晨刷 = 解锁深夜专属</li>
      <li><span class="li-no">04</span>右上角奖杯 → 你的档案本</li>
      <li><span class="li-no">05</span>截图分享 — 让朋友也被颁奖</li>
    </ul>
    <div class="zine-divider thin"></div>
    <p class="zine-foot">
      抖音黑客松 Demo · 灵感来自<br>
      <i>Steam 成就 + 抖音 + 互联网荒诞性</i>
    </p>
  </aside>

  <script type="module" src="js/app.js"></script>
</body>
</html>
