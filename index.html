<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#05060a">
  <title>互联网生存成就系统 · AI 给你颁发离谱成就</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="phone">
    <!-- 头部 -->
    <header class="header">
      <div class="header-brand">
        <span class="brand-dot"></span>
        <span class="brand-text">互联网生存成就</span>
      </div>
      <div class="header-actions">
        <button class="hbtn" id="headerSound">🔇</button>
        <button class="hbtn trophy" id="headerTrophy">
          <span>🏆</span><span class="badge"><b id="headerCount">0</b></span>
        </button>
      </div>
    </header>

    <!-- 抖音风信息流（垂直snap） -->
    <div class="feed" id="feed"></div>

    <!-- 弹窗组件挂载点（叠加在 phone 内） -->
    <div id="popupRoot"></div>

    <!-- 成就馆挂载点 -->
    <div id="galleryRoot"></div>

    <!-- 今日人设卡片挂载点 -->
    <div id="personaRoot"></div>
  </main>

  <!-- 桌面端旁边的提示 / 说明（移动端会隐藏） -->
  <aside class="side-note">
    <h1>互联网生存成就系统</h1>
    <p class="lead">AI 一边偷偷观察你刷手机，一边给你颁发离谱的成就。</p>
    <ul class="hint-list">
      <li>👆 上下滑动浏览不同分类视频</li>
      <li>❤️ 点赞/收藏/打开评论会触发不同成就</li>
      <li>⌨️ 试试打开输入框 又关掉</li>
      <li>🕒 凌晨打开会有「深夜哲学家」</li>
      <li>🏆 右上角奖杯 → 你的成就墙 (可截图分享)</li>
    </ul>
    <p class="foot-note">这是一个黑客松 Demo · 灵感来自 Steam 成就 + 抖音 + 互联网荒诞性</p>
  </aside>

  <script type="module" src="js/app.js"></script>
</body>
</html>
